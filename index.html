<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Engine · BTC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg:#05050e; --bg2:#0a0a1a; --bg3:#0f0f22; --amber:#f0a500; --cyan:#00d4ff;
      --green:#00ff88; --red:#ff3058; --text:#b8b8cc; --dim:#55556a;
      --border:rgba(240,165,0,0.15);
    }
    body.light {
      --bg:#f4f5fb; --bg2:#eceef8; --bg3:#e2e5f4; --amber:#c07800; --cyan:#0055bb;
      --green:#007744; --red:#cc2244; --text:#1a1a3a; --dim:#6666aa;
      --border:rgba(0,0,100,0.12);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.6rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'Orbitron',monospace;font-weight:900;letter-spacing:.2em;color:var(--amber);font-size:1.1rem}
    .logo span{color:var(--cyan)}
    .tag{font-size:.6rem;color:var(--dim);letter-spacing:.15em;margin-left:.6rem}
    .header-right{display:flex;align-items:center;gap:1rem}
    .price{font-size:1.2rem;font-weight:600;color:var(--cyan)}
    select,button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:3px;
      font-family:inherit;font-size:.7rem;padding:.4rem .6rem;cursor:pointer}
    button:hover,select:hover{border-color:var(--amber);color:var(--amber)}
    .navlink{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--cyan);
      text-decoration:none;border:1px solid var(--border);border-radius:3px;padding:.4rem .6rem}
    .navlink:hover{border-color:var(--cyan)}
    main{display:grid;grid-template-columns:1fr 420px;gap:1rem;padding:1rem 1.6rem;max-width:1900px;margin:0 auto}
    @media(max-width:1100px){main{grid-template-columns:1fr}}
    @media(max-width:640px){
      header{flex-wrap:wrap;gap:.5rem;padding:.7rem 1rem}
      .tag{display:none}
      .header-right{flex-wrap:wrap;gap:.5rem;width:100%}
      .price{font-size:1rem}
      main{padding:.5rem;gap:.6rem}
      #chart{height:340px}
      #scenarios{max-height:none}
      .lean-nums{display:none}
      .tf-chips{flex-wrap:wrap;gap:.3rem}
      .panel-title{font-size:.52rem;padding:.6rem .8rem}
      .row .k{min-width:68px}
    }
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden}
    .panel.span-all{grid-column:1/-1}
    .panel-title{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--amber);
      padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .tabs{display:flex;gap:.3rem}
    .tab{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.1em;padding:.25rem .55rem;
      background:var(--bg3);border:1px solid var(--border);color:var(--dim);border-radius:2px;cursor:pointer}
    .tab:hover{color:var(--amber)} .tab.active{color:var(--amber);border-color:var(--amber);background:rgba(240,165,0,0.08)}
    .tf-chips{display:flex;gap:.4rem;flex:1;justify-content:center}
    .tf-chip{font-size:.62rem;padding:.2rem .5rem;border-radius:2px;border:1px solid var(--border);letter-spacing:.05em}
    .tf-chip.up{color:var(--green);border-color:rgba(0,255,136,0.3)}
    .tf-chip.down{color:var(--red);border-color:rgba(255,48,88,0.3)}
    .tf-chip.mixed{color:var(--dim)}
    #chart{height:620px;width:100%}
    .side{display:flex;flex-direction:column;gap:1rem}
    #pattern-list{padding:.6rem;display:flex;flex-direction:column;gap:.6rem;max-height:80vh;overflow-y:auto}
    .pcard{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent);
      border-radius:3px;padding:.7rem;cursor:pointer;transition:box-shadow .15s}
    .pcard:hover{box-shadow:0 0 6px var(--accent)}
    .pcard.selected{box-shadow:0 0 12px var(--accent);border-color:var(--accent)}
    .pcard.live{border-style:dashed;opacity:.9}
    .pcard-head{display:flex;align-items:center;gap:.5rem;font-size:.78rem;margin-bottom:.4rem}
    .pname{flex:1;font-weight:600;color:var(--text)}
    .pbias{font-size:.62rem;text-transform:uppercase;letter-spacing:.05em}
    .pbias.bull{color:var(--green)} .pbias.bear{color:var(--red)}
    .live-badge{font-size:.5rem;letter-spacing:.12em;padding:.1rem .3rem;
      border:1px solid var(--amber);color:var(--amber);border-radius:2px;white-space:nowrap}
    .prob-bar{height:3px;background:var(--border);border-radius:2px;margin:.3rem 0;overflow:hidden}
    .prob-bar i{display:block;height:100%}
    .prow{display:flex;gap:.5rem;font-size:.65rem;margin-top:.25rem}
    .pk{color:var(--dim);min-width:56px}
    .pv{color:var(--text)}
    .muted{color:var(--dim)}
    .section-label{font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:.18em;color:var(--dim);
      padding:.35rem .8rem;border-bottom:1px solid var(--border);border-top:1px solid var(--border);
      background:rgba(255,255,255,0.02)}
    .pcard.pred{border-left-style:solid}
    .pcard.pinned{box-shadow:0 0 10px rgba(255,204,68,0.25)}
    .pin-btn{background:transparent;border:none;padding:0 .25rem;font-size:.75rem;line-height:1;
      cursor:pointer;opacity:.3;color:inherit;margin-left:auto;transition:opacity .15s}
    .pin-btn:hover,.pin-btn.on{opacity:1}
    .pred-metrics{font-size:.56rem;color:var(--dim);padding:.45rem .9rem;
      border-top:1px solid var(--border);text-align:center;letter-spacing:.05em}
    footer{padding:.8rem 1.6rem;font-size:.6rem;color:var(--dim);border-top:1px solid var(--border);line-height:1.6}
    #status{font-size:.62rem;color:var(--dim);padding:.4rem 1.6rem}
    #status.error{color:var(--red)}
    button#annot-mode.on{opacity:1;color:var(--amber);border-color:var(--amber);background:rgba(240,165,0,0.08)}
    #annot-bar{align-items:center;gap:.8rem;padding:.5rem 1rem;background:rgba(240,165,0,0.06);
      border-top:1px solid rgba(240,165,0,0.3);font-size:.68rem;flex-wrap:wrap}
    #annot-step{color:var(--amber);font-weight:500}
    #annot-type-info{color:var(--dim)}
  </style>
</head>
<body>
  <header>
    <div>
      <span class="logo">INDIKTOR</span>
      <span class="tag">FLAT PATTERN DETECTOR · 8 PATTERNS</span>
    </div>
    <div class="header-right">
      <span class="price" id="price">—</span>
      <select id="asset" title="Changer d'actif">
        <option value="BTCUSDT">BTC</option>
        <option value="ETHUSDT">ETH</option>
        <option value="SOLUSDT">SOL</option>
      </select>
      <label class="tag">K (ATR×)
        <input type="number" id="sensitivity" min="0.5" max="15" step="0.5" value="3"
          title="Seuil de renversement zigzag (k × ATR-14)"
          style="width:58px;text-align:center;padding:.35rem .4rem">
      </label>
      <label class="tag">CONFIANCE MIN
        <select id="min-conf" title="Seuil de confiance minimum pour accepter un pattern">
          <option value="0.40">Souple (40%)</option>
          <option value="0.55" selected>Normale (55%)</option>
          <option value="0.65">Stricte (65%)</option>
          <option value="0.75">Très stricte (75%)</option>
        </select>
      </label>
      <button id="theme-toggle" title="Thème clair/sombre">☀</button>
      <button id="refresh">↻ REFRESH</button>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-title">STRUCTURE DE PRIX <span class="tabs" id="tabs"></span><button id="annot-mode" title="Annoter manuellement un pattern" style="font-family:inherit;font-size:.55rem;letter-spacing:.1em;padding:.2rem .5rem;opacity:.6">✏ ANNOTER</button></div>
      <div id="chart"></div>
      <div id="annot-bar" style="display:none">
        <span id="annot-step"></span>
        <span id="annot-type-info"></span>
        <select id="annot-type" style="display:none">
          <option value="regular">Regular Flat</option>
          <option value="running">Running Flat</option>
          <option value="expanding">Expanding Flat</option>
          <option value="contracting">Contracting Flat</option>
        </select>
        <button id="annot-confirm" style="display:none">✓ CONFIRMER</button>
        <button id="annot-cancel">✕ ANNULER</button>
      </div>
    </div>
    <div class="side">
      <div class="panel">
        <div class="panel-title">ANALYSE · PRÉDICTIONS</div>
        <div id="pattern-list"></div>
      </div>
    </div>
  </main>

  <div id="status"></div>
  <footer>
    Détection basée sur les niveaux : B casse A-start? × C casse A-end? → 4 types × 2 directions = 8 patterns.
    Cliquer un pattern dans la liste pour le zoomer sur le chart. Données : Binance REST.
  </footer>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
